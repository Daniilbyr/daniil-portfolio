<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eceef1" />
    <meta name="color-scheme" content="light" />
    <title>test</title>
    <link rel="stylesheet" href="styles.css?v=test-layout-2026" />
  </head>
  <body class="page">
    <div class="page-bg" aria-hidden="true">
      <span class="page-bg__orb page-bg__orb--1"></span>
      <span class="page-bg__orb page-bg__orb--2"></span>
      <span class="page-bg__orb page-bg__orb--3"></span>
      <span class="page-bg__sheen"></span>
    </div>

    <header class="site-header">
      <div class="site-header__inner">
        <nav class="nav-main" aria-hidden="true">
          <a href="#"></a>
          <a href="#"></a>
          <a href="#"></a>
          <a href="#"></a>
        </nav>
        <a class="logo" href="#" aria-hidden="true"><span class="logo__text">&#8203;</span></a>
        <div class="nav-tools">
          <a href="#" class="nav-tools__link"></a>
          <a href="#" class="nav-tools__link"></a>
          <a href="#" class="nav-tools__link"></a>
        </div>
      </div>
    </header>

    <main id="main">
      <div class="container container--narrow">
        <nav class="breadcrumbs reveal" data-reveal aria-hidden="true">
          <a href="#"></a>
          <span class="breadcrumbs__sep"></span>
          <a href="#"></a>
          <span class="breadcrumbs__sep"></span>
          <a href="#"></a>
          <span class="breadcrumbs__sep"></span>
          <span class="breadcrumbs__current"></span>
        </nav>

        <article class="pdp">
          <div class="pdp__grid">
            <div class="pdp__gallery reveal reveal--delay-1" data-reveal>
              <div class="pdp__media js-pdp-media is-loaded">
                <figure class="pdp__figure">
                  <div class="pdp__photo pdp__photo--placeholder" aria-hidden="true"></div>
                </figure>
                <button type="button" class="pdp__zoom-hint" tabindex="-1" aria-hidden="true"></button>
              </div>
            </div>

            <div class="pdp__info reveal reveal--delay-2" data-reveal>
              <div class="pdp__title-row">
                <div class="pdp__title-block">
                  <p class="pdp__eyebrow"></p>
                  <h1 class="pdp__title"></h1>
                </div>
              </div>

              <p class="pdp__subtitle"></p>

              <div class="pdp__meta">
                <span class="pdp__sku"><span class="pdp__sku-label"></span></span>
                <span class="pdp__stock pdp__stock--in" role="status"></span>
              </div>

              <p class="pdp__price">
                <span class="pdp__price-currency" aria-hidden="true"></span>
                <span class="pdp__price-value" id="pdp-price-main"></span>
              </p>

              <div class="pdp__divider" aria-hidden="true"></div>

              <div class="pdp__field">
                <p class="pdp__label" id="size-label"></p>
                <div class="size-row" role="radiogroup" aria-labelledby="size-label">
                  <button type="button" class="size size--active" role="radio" aria-checked="true" data-price="158"></button>
                  <button type="button" class="size" role="radio" aria-checked="false" data-price="198"></button>
                  <button type="button" class="size" role="radio" aria-checked="false" data-price="248"></button>
                </div>
              </div>

              <div class="pdp__desc">
                <p></p>
                <p></p>
              </div>

              <ul class="pdp__trust" role="list">
                <li class="pdp__trust-item"><span class="pdp__trust-ic" aria-hidden="true"></span></li>
                <li class="pdp__trust-item"><span class="pdp__trust-ic" aria-hidden="true"></span></li>
                <li class="pdp__trust-item"><span class="pdp__trust-ic" aria-hidden="true"></span></li>
              </ul>

              <button type="button" class="btn btn--black js-main-cta" id="main-cta"></button>
              <p class="pdp__fineprint"></p>
            </div>
          </div>
        </article>
      </div>

      <section class="pdp-details">
        <div class="container container--narrow">
          <h2 id="details-heading" class="pdp-details__heading reveal" data-reveal></h2>
          <div class="accordion reveal" data-reveal>
            <div class="accordion__item">
              <button type="button" class="accordion__trigger" aria-expanded="true" aria-controls="acc-1" id="acc-btn-1">
                <span></span>
                <span class="accordion__icon" aria-hidden="true"></span>
              </button>
              <div class="accordion__panel" id="acc-1" role="region" aria-labelledby="acc-btn-1">
                <p></p>
              </div>
            </div>
            <div class="accordion__item">
              <button type="button" class="accordion__trigger" aria-expanded="false" aria-controls="acc-2" id="acc-btn-2">
                <span></span>
                <span class="accordion__icon" aria-hidden="true"></span>
              </button>
              <div class="accordion__panel accordion__panel--hidden" id="acc-2" role="region" aria-labelledby="acc-btn-2" hidden>
                <p></p>
              </div>
            </div>
            <div class="accordion__item">
              <button type="button" class="accordion__trigger" aria-expanded="false" aria-controls="acc-3" id="acc-btn-3">
                <span></span>
                <span class="accordion__icon" aria-hidden="true"></span>
              </button>
              <div class="accordion__panel accordion__panel--hidden" id="acc-3" role="region" aria-labelledby="acc-btn-3" hidden>
                <p></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="trust-strip" aria-hidden="true">
        <div class="container">
          <ul class="trust-strip__grid">
            <li class="trust-strip__item">
              <span class="trust-strip__num"></span>
              <span class="trust-strip__title"></span>
              <span class="trust-strip__text"></span>
            </li>
            <li class="trust-strip__item">
              <span class="trust-strip__num"></span>
              <span class="trust-strip__title"></span>
              <span class="trust-strip__text"></span>
            </li>
            <li class="trust-strip__item">
              <span class="trust-strip__num"></span>
              <span class="trust-strip__title"></span>
              <span class="trust-strip__text"></span>
            </li>
            <li class="trust-strip__item">
              <span class="trust-strip__num"></span>
              <span class="trust-strip__title"></span>
              <span class="trust-strip__text"></span>
            </li>
          </ul>
        </div>
      </section>

      <section class="related">
        <div class="container">
          <header class="related__head reveal" data-reveal>
            <p class="related__eyebrow"></p>
            <h2 id="related-heading" class="related__title"></h2>
          </header>
          <div class="related__grid">
            <article class="card-mini reveal reveal--delay-1" data-reveal>
              <a href="#" class="card-mini__link">
                <div class="card-mini__img js-card-img is-loaded">
                  <div class="card-mini__placeholder" aria-hidden="true"></div>
                </div>
                <div class="card-mini__bar">
                  <span class="card-mini__name"></span>
                  <span class="card-mini__price"></span>
                </div>
              </a>
            </article>
            <article class="card-mini reveal reveal--delay-2" data-reveal>
              <a href="#" class="card-mini__link">
                <div class="card-mini__img js-card-img is-loaded">
                  <div class="card-mini__placeholder" aria-hidden="true"></div>
                </div>
                <div class="card-mini__bar">
                  <span class="card-mini__name"></span>
                  <span class="card-mini__price"></span>
                </div>
              </a>
            </article>
            <article class="card-mini reveal reveal--delay-3" data-reveal>
              <a href="#" class="card-mini__link">
                <div class="card-mini__img js-card-img is-loaded">
                  <div class="card-mini__placeholder" aria-hidden="true"></div>
                </div>
                <div class="card-mini__bar">
                  <span class="card-mini__name"></span>
                  <span class="card-mini__price"></span>
                </div>
              </a>
            </article>
          </div>
        </div>
      </section>
    </main>

    <div class="pdp-sticky" id="pdp-sticky" role="region" hidden>
      <div class="pdp-sticky__inner container">
        <div class="pdp-sticky__product">
          <span class="pdp-sticky__title"></span>
          <span class="pdp-sticky__price"
            ><span class="pdp-sticky__currency"></span><span class="pdp-sticky__value" id="pdp-price-sticky"></span
          ></span>
        </div>
        <button type="button" class="btn btn--black btn--sticky pdp-sticky__btn"></button>
      </div>
    </div>

    <footer class="site-footer site-footer--editorial">
      <div class="container">
        <div class="footer-grid reveal" data-reveal>
          <div class="footer-visual">
            <div class="footer-visual__cell">
              <div class="footer-mosaic footer-mosaic--placeholder" aria-hidden="true"></div>
            </div>
            <div class="footer-visual__cell">
              <div class="footer-mosaic footer-mosaic--placeholder" aria-hidden="true"></div>
            </div>
            <div class="footer-visual__cell footer-visual__cell--logo">
              <span class="footer-visual__apollo"></span>
            </div>
            <div class="footer-visual__cell">
              <div class="footer-mosaic footer-mosaic--placeholder" aria-hidden="true"></div>
            </div>
          </div>
          <nav class="footer-nav" aria-hidden="true">
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
          </nav>
          <div class="footer-tools">
            <a href="#"></a>
            <a href="#"></a>
            <a href="#"></a>
          </div>
          <div class="footer-social">
            <a href="#" rel="noopener noreferrer"></a>
            <a href="#" rel="noopener noreferrer"></a>
            <a href="#" rel="noopener noreferrer"></a>
            <a href="#" rel="noopener noreferrer"></a>
            <a href="#" rel="noopener noreferrer"></a>
          </div>
        </div>
        <div class="footer-legal">
          <a href="#"></a>
          <a href="#"></a>
          <a href="#"></a>
        </div>
        <p class="footer-copy"></p>
      </div>
    </footer>

    <script src="app.js?v=test-layout-2026" defer></script>
  </body>
</html>
